<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:transparent; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  #content, #scrollContent { -webkit-user-select:text; user-select:text; }
  #stage { position:fixed; inset:0; overflow:hidden; perspective:1400px; }
  /* shifter slides horizontally; #stage clips. content must NOT clip or
     every column past the first is hidden (only first page was readable). */
  #shifter { position:absolute; inset:0; will-change:transform; transform-style:preserve-3d; backface-visibility:hidden; }
  #curlShade { position:absolute; inset:0; pointer-events:none; opacity:0; z-index:4; }
  #content {
    position:absolute; inset:0; height:100%;
    column-fill:auto; -webkit-column-fill:auto; overflow:visible;
    word-wrap:break-word; overflow-wrap:break-word;
  }
  #content p { margin:0; text-indent:1.4em; }
  #content p:first-of-type, #content p.no-indent { text-indent:0; }
  #content h1, #content h2, #content h3 { margin:0 0 .7em 0; line-height:1.25; text-indent:0; text-align:center; }
  #content h1 + p, #content h2 + p, #content h3 + p { text-indent:0; }
  #content img { max-width:100%; height:auto; }
  #scrollContent {
    position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  #scrollContent p { margin:0; text-indent:1.4em; }
  #scrollContent p:first-of-type, #scrollContent p.no-indent { text-indent:0; }
  #scrollContent h1, #scrollContent h2, #scrollContent h3 { margin:0 0 .7em 0; line-height:1.25; text-indent:0; text-align:center; }
  #scrollContent h1 + p, #scrollContent h2 + p, #scrollContent h3 + p { text-indent:0; }
  #scrollContent img { max-width:100%; height:auto; }
  /* soft page edge shadow, shown while dragging / turning */
  #edge { position:absolute; top:0; bottom:0; width:24px; pointer-events:none;
          opacity:0; transition:opacity .2s; z-index:4;
          background:linear-gradient(to right, rgba(0,0,0,0.18), rgba(0,0,0,0)); }
  .warm-veil, .dim-veil { position:absolute; inset:0; pointer-events:none; transition:opacity .2s; }
  .warm-veil { background:#c98a2e; mix-blend-mode:multiply; opacity:0; z-index:5; }
  .dim-veil { background:#000; opacity:0; z-index:6; }
  #pageNum {
    position:absolute; left:0; right:0; bottom:14px; text-align:center;
    font-size:12px; letter-spacing:.02em; opacity:0.55; pointer-events:none; z-index:3;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="shifter"><div id="content"></div></div>
    <div id="scrollContent" style="display:none"></div>
    <div id="pageNum"></div>
    <div id="edge"></div>
    <div id="curlShade"></div>
    <div class="warm-veil" id="warmVeil"></div>
    <div class="dim-veil" id="dimVeil"></div>
  </div>
<script>
  var prefs = {};
  var page = 0, total = 1;
  var mode = 'paged';
  var pendingFraction = null;   // applied after next relayout (progress seek)

  function stageWidth() {
    return document.getElementById('stage').offsetWidth || window.innerWidth;
  }

  function applyPrefs(json) {
    prefs = JSON.parse(json);
    document.body.style.background = prefs.bg;
    document.body.style.color = prefs.fg;
    var c = document.getElementById('content');
    var sc = document.getElementById('scrollContent');
    var justified = prefs.align === 'justify';
    [c, sc].forEach(function (el) {
      el.style.fontFamily = prefs.font;
      el.style.fontSize = prefs.size + 'px';
      el.style.lineHeight = prefs.lh;
      el.style.fontWeight = prefs.weight;
      el.style.textAlign = prefs.align;
      el.style.hyphens = justified ? 'auto' : 'manual';
      el.style.webkitHyphens = justified ? 'auto' : 'manual';
      el.style.padding = '64px ' + prefs.mx + 'px 72px ' + prefs.mx + 'px';
      el.style.color = prefs.fg;
    });
    document.documentElement.lang = 'en'; // enables hyphenation dictionary
    mode = prefs.scroll ? 'scroll' : 'paged';
    c.style.display = prefs.scroll ? 'none' : 'block';
    sc.style.display = prefs.scroll ? 'block' : 'none';
    document.getElementById('warmVeil').style.opacity = (prefs.warmth || 0) * 0.22;
    document.getElementById('dimVeil').style.opacity = (1 - (prefs.brightness == null ? 1 : prefs.brightness)) * 0.85;
    var pn = document.getElementById('pageNum');
    pn.style.color = prefs.fg;
    pn.style.fontFamily = prefs.font;
    relayout();
  }

  function setHtml(html) {
    document.getElementById('content').innerHTML = html;
    document.getElementById('scrollContent').innerHTML = html;
    document.getElementById('scrollContent').scrollTop = 0;
    page = 0;
    relayout();
  }

  function relayout() {
    var stageW = stageWidth();
    var mx = prefs.mx || 30;
    var c = document.getElementById('content');
    c.style.columnWidth = Math.max(40, stageW - 2 * mx) + 'px';
    c.style.columnGap = (2 * mx) + 'px';
    c.style.width = stageW + 'px';
    total = Math.max(1, Math.round(c.scrollWidth / stageW));
    if (pendingFraction != null) {
      page = Math.round(pendingFraction * (total - 1));
      pendingFraction = null;
    }
    page = Math.min(page, total - 1);
    goTo(page, false);
  }

  function setTransform(x, animate) {
    var sh = document.getElementById('shifter');
    var shade = document.getElementById('curlShade');
    var isCurl = prefs.flip === 'curl';
    var dur = isCurl ? 520 : 360;
    var props = isCurl ? 'transform ' + dur + 'ms cubic-bezier(.25,.8,.25,1), ' +
      'opacity ' + dur + 'ms linear' : 'transform ' + dur + 'ms cubic-bezier(.25,.8,.25,1)';
    sh.style.transition = animate ? props : 'none';
    shade.style.transition = sh.style.transition;

    if (isCurl) {
      var stageW = stageWidth();
      var baseX = -page * stageW;
      var deviation = x - baseX;
      var frac = stageW > 0 ? Math.max(-1, Math.min(1, deviation / stageW)) : 0;
      var rot = -frac * 50;
      sh.style.transformOrigin = (deviation < 0) ? 'right center' : 'left center';
      sh.style.transform = 'translateX(' + x + 'px) rotateY(' + rot + 'deg)';
      var shadeOpacity = Math.abs(frac) * 0.5;
      shade.style.left = (deviation < 0) ? '0px' : 'auto';
      shade.style.right = (deviation < 0) ? 'auto' : '0px';
      shade.style.width = (Math.abs(frac) * stageW) + 'px';
      shade.style.background = (deviation < 0)
        ? 'linear-gradient(to left, rgba(0,0,0,' + shadeOpacity + '), rgba(0,0,0,0))'
        : 'linear-gradient(to right, rgba(0,0,0,' + shadeOpacity + '), rgba(0,0,0,0))';
      shade.style.opacity = '1';
    } else {
      sh.style.transform = 'translateX(' + x + 'px)';
      shade.style.opacity = '0';
    }
  }

  function goTo(p, animate) {
    p = Math.max(0, Math.min(total - 1, p));
    page = p;
    var stageW = stageWidth();
    if (animate && prefs.flip === 'fade') {
      setTransform(-p * stageW, false);
      var c = document.getElementById('content');
      if (c.animate) c.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 300 });
    } else {
      setTransform(-p * stageW, animate && prefs.flip !== 'none');
    }
    report();
  }

  function next() { if (page < total - 1) { goTo(page + 1, true); return true; } return false; }
  function prev() { if (page > 0) { goTo(page - 1, true); return true; } return false; }
  function jumpToStart() { page = 0; goTo(0, false); }
  function jumpToEnd() { goTo(total - 1, false); }
  function setPage(p) { goTo(p, false); }

  // Called by the native progress slider: jump within the current chapter.
  function seekFraction(frac) {
    if (total <= 1) return;
    goTo(Math.round(frac * (total - 1)), false);
  }
  // Stored before a chapter loads, applied on the following relayout.
  function setPendingFraction(frac) { pendingFraction = frac; }

  function report() {
    // Global (whole-book) page numbering is rendered natively, not per-chapter here.
    if (window.FolioBridge) window.FolioBridge.onState(page, total);
  }

  document.addEventListener('selectionchange', function () {
    var sel = window.getSelection();
    var text = sel ? sel.toString() : '';
    if (window.FolioBridge) window.FolioBridge.onSelection(text);
  });

  document.getElementById('scrollContent').addEventListener('scroll', function (e) {
    var el = e.target;
    var pct = el.scrollTop / Math.max(1, el.scrollHeight - el.clientHeight);
    if (window.FolioBridge) window.FolioBridge.onScroll(pct);
  });

  window.addEventListener('resize', relayout);

  // ---- gesture handling: swipe-to-turn (page follows finger) + taps ----
  var dragging = false, startX = 0, startY = 0, lastX = 0, baseX = 0, moved = false, axisLocked = '';
  var stage = document.getElementById('stage');
  var edge = document.getElementById('edge');

  function showEdge(x, vis) {
    edge.style.left = (x < stageWidth() / 2) ? '0px' : (stageWidth() - 24) + 'px';
    edge.style.transform = (x < stageWidth() / 2) ? 'scaleX(-1)' : 'none';
    edge.style.opacity = vis ? '1' : '0';
  }

  stage.addEventListener('touchstart', function (e) {
    if (mode !== 'paged') return;
    var t = e.touches[0];
    dragging = true; moved = false; axisLocked = '';
    startX = lastX = t.clientX; startY = t.clientY;
    baseX = -page * stageWidth();
  }, { passive: true });

  stage.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    var t = e.touches[0];
    var dx = t.clientX - startX;
    var dy = t.clientY - startY;
    if (axisLocked === '') {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) axisLocked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
    }
    if (axisLocked !== 'x') return;
    moved = true;
    lastX = t.clientX;
    // resist past the first/last page
    var atStart = page === 0 && dx > 0;
    var atEnd = page === total - 1 && dx < 0;
    var eff = (atStart || atEnd) ? dx * 0.35 : dx;
    setTransform(baseX + eff, false);
    showEdge(t.clientX, true);
  }, { passive: true });

  stage.addEventListener('touchend', function (e) {
    if (!dragging) return;
    dragging = false;
    edge.style.opacity = '0';
    var dx = lastX - startX;
    if (axisLocked === 'x' && moved) {
      var threshold = stageWidth() * 0.18;
      if (dx <= -threshold) { if (!next()) { if (window.FolioBridge) window.FolioBridge.onNextChapter(); } }
      else if (dx >= threshold) { if (!prev()) { if (window.FolioBridge) window.FolioBridge.onPrevChapter(); } }
      else { goTo(page, true); } // snap back
      return;
    }
    // treat as a tap
    handleTap(lastX);
  }, { passive: true });

  function handleTap(x) {
    if (mode !== 'paged') { if (window.FolioBridge) window.FolioBridge.onTapMiddle(); return; }
    var w = stageWidth();
    var tapEnabled = prefs.tap !== false;
    if (tapEnabled && x < w * 0.28) { if (!prev() && window.FolioBridge) window.FolioBridge.onPrevChapter(); }
    else if (tapEnabled && x > w * 0.72) { if (!next() && window.FolioBridge) window.FolioBridge.onNextChapter(); }
    else { if (window.FolioBridge) window.FolioBridge.onTapMiddle(); }
  }

  // Fallback for environments that fire click without touch (rare on device).
  stage.addEventListener('click', function (e) {
    if (moved) { moved = false; return; }
    if (mode !== 'paged') { if (window.FolioBridge) window.FolioBridge.onTapMiddle(); return; }
  });
</script>
</body>
</html>
